server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: badwallet-api
  datasource:
    url: jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# URL du microservice payment-service (appelé via PaymentClient)
payment-service:
  base-url: http://localhost:8081
